mode: deployment

# M0.4a / D13.15 (2026-05-24): bumped resources + replicaCount to handle
# projected post-M1-M4 span throughput (~9-15k spans/sec at v5 peak,
# vs ~500 at v4-large peak). Pre-M5.2 the chart used Helm defaults; now
# explicit so a future cluster rebuild gets the right sizing.
replicaCount: 2
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2
    memory: 2Gi

image:
  repository: otel/opentelemetry-collector-contrib

fullnameOverride: opentelemetrycollector

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP

presets:
  kubernetesAttributes:
    enabled: true

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    # M0.4b / D13.15 (2026-05-24): bump batch sizes — chart default
    # send_batch_size=8192 was a bottleneck at v5 projected span rates.
    batch:
      send_batch_size: 8192
      send_batch_max_size: 16384
      timeout: 200ms
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25
    k8sattributes:
      auth_type: serviceAccount
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.deployment.name
          - k8s.node.name
        labels:
          - tag_name: app
            key: app
            from: pod
          - tag_name: research.dataset
            key: research.jira-telemetry/dataset
            from: pod
          - tag_name: service.tier
            key: research.jira-telemetry/service-tier
            from: pod
    resource:
      attributes:
        - key: deployment.environment
          value: research-local
          action: upsert
        - key: service.namespace
          value: online-boutique
          action: upsert
        - key: dataset.name
          value: online-boutique-jira-telemetry
          action: upsert
        - key: jira.mode
          value: shadow
          action: upsert

  exporters:
    otlp/tempo:
      endpoint: tempo.observability.svc.cluster.local:4317
      tls:
        insecure: true
    prometheus:
      endpoint: 0.0.0.0:8889
      namespace: online_boutique
      const_labels:
        dataset: online_boutique_jira_telemetry
    debug:
      verbosity: basic

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters: [otlp/tempo, debug]
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters: [prometheus, debug]

serviceMonitor:
  enabled: true
  metricsEndpoints:
    - port: metrics

