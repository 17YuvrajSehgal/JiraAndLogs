schema_version: 1
scenario_id: otel-demo-ad-outage-major
title: Ad service outage via flagd — banner ads fail silently
dataset_run_id: otel-demo-placeholder-run
traffic_profile_id: otel-demo-baseline-checkout-mix
environment: research-otel-demo
jira_candidate: true
expected_jira:
  issue_type: Incident
  priority: Major
  components: [ad, frontend]
  labels: [synthetic-incident, application-fault, ad, telemetry-linked]
  summary_template: "Ad service failures — no ads showing site-wide"
  description_template: |
    Synthetic lab issue generated from scenario otel-demo-ad-outage-major.

    The adFailure flag is on. Ad service returns errors; frontend ad slots
    show placeholders or empty. Non-revenue-blocking but visible.
fault:
  fault_id: ad-outage-001
  fault_type: application_fault
  affected_service: ad
  expected_start_offset_seconds: 300
  expected_duration_seconds: 600
  blast_radius: {user_visible: true, expected_error_rate: high, expected_latency_impact: low}
labels:
  severity: major
  incident_type: outage
  root_cause_category: application_fault
  should_alert: true
  should_create_jira_shadow_issue: true
execution:
  action: Flagd
  namespace: otel-demo-research
  flagd_flag: adFailure
  flagd_variant: "on"
triage:
  schema_version: 1
  scenario_family: ad-outage
  per_window:
    pre_fault_baseline: {triage_label: noise, is_hard_case: false, rationale: "Pre-fault; ad healthy."}
    active_fault: {triage_label: ticket_worthy, triage_severity: major, triage_components: [ad], triage_reason_class: application_fault, is_hard_case: false, rationale: "Ad service failing; banners empty."}
    recovery_window: {triage_label: borderline, triage_severity: minor, triage_components: [ad], triage_reason_class: application_fault, is_hard_case: true, rationale: "Flag off; transient retries clear."}
