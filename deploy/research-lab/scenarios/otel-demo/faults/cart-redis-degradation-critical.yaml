  summary_template: "Cart dependency degradation caused checkout failures"
  description_template: |
    Synthetic lab issue generated from scenario otel-demo-cart-redis-degradation-critical.

    valkey-cart (cart's Redis-compatible cache) was scaled to zero replicas
    during checkout traffic. Cart writes and reads fail; users see add-to-cart
    not persisting; downstream checkout returns errors.
fault:
  fault_id: cart-redis-001
  fault_type: dependency_failure
  affected_service: valkey-cart
  suggested_mechanism: scale valkey-cart deployment to 0 replicas
  expected_start_offset_seconds: 300
  expected_duration_seconds: 600
  blast_radius:
    user_visible: true
    expected_error_rate: high
    expected_latency_impact: medium
labels:
  severity: critical
  incident_type: outage
  root_cause_category: dependency_failure
  should_alert: true
  should_create_jira_shadow_issue: true
execution:
  action: ScaleDeployment
  namespace: otel-demo-research
  target_kind: deployment
  target_name: valkey-cart
  replicas: 0
  restore_replicas: 1
triage:
