schema_version: 1
scenario_id: otel-demo-network-latency-major
title: Network latency on currency-service — slow FX conversion degrades checkout
dataset_run_id: otel-demo-placeholder-run
traffic_profile_id: otel-demo-baseline-checkout-mix
environment: research-otel-demo
jira_candidate: true
expected_jira:
  issue_type: Incident
  priority: High
  components:
    - currency
    - checkout
    - frontend
  labels:
    - synthetic-incident
    - network-latency
    - chaos-mesh
    - telemetry-linked
  summary_template: "Elevated latency on currency-service degraded checkout response times"
  description_template: |
    Synthetic lab issue generated from scenario otel-demo-network-latency-major.

    A chaos-mesh NetworkChaos delay (500ms +/- 100ms jitter) was injected on
    currency-service network I/O during checkout traffic. Currency conversions
    slowed, propagating latency up through checkout and the frontend. Requests
    succeed but p95/p99 latency climbs sharply during the active-fault window.
fault:
  fault_id: network-latency-001
  fault_type: network_latency
  affected_service: currency
  suggested_mechanism: chaos-mesh NetworkChaos delay 500ms on currency
  expected_start_offset_seconds: 300
  expected_duration_seconds: 600
  blast_radius:
    user_visible: true
    expected_error_rate: low
    expected_latency_impact: high
labels:
  severity: major
  incident_type: degradation
  root_cause_category: network_latency
  should_alert: true
  should_create_jira_shadow_issue: true
execution:
  action: ChaosMeshChaos
  namespace: otel-demo-research
  chaos_manifest: deploy/research-lab/scenarios/otel-demo/chaos/manifests/network-latency-currency.yaml
triage:
  schema_version: 1
  scenario_family: network-latency
  per_window:
    pre_fault_baseline:
      triage_label: noise
      is_hard_case: false
      rationale: "Pre-fault baseline; currency latency nominal."
    active_fault:
      triage_label: ticket_worthy
      triage_severity: major
      triage_components:
        - currency
        - checkout
      triage_reason_class: network_latency
      is_hard_case: true
      rationale: "Injected network delay raises checkout latency without hard errors."
    recovery_window:
      triage_label: borderline
      triage_severity: minor
      triage_components:
        - currency
      triage_reason_class: network_latency
      is_hard_case: true
      rationale: "Latency tail recovers as the delay is removed."
