  description_template: |
    Synthetic L4 (compound-primitive) scenario.

    Two faults of DIFFERENT mechanisms were applied together: a resource fault
    (adHighCpu flag drives ad-service CPU saturation) and a network fault
    (chaos-mesh NetworkChaos delay of 400ms on shipping-service). The two
    mechanisms stress different telemetry channels at once — CPU/runtime metrics
    for ad, span latency for shipping — modelling a heterogeneous incident.

    Multi-gold retrieval target: this episode contributes two distinct gold
    tickets (one per mechanism). Recall@5 should capture at least one;
    AllGold@5 measures whether the cascade captures both across mechanism types.
