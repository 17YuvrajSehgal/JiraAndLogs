  summary_template: "Concurrent payment outage + cart-cache outage during peak checkout"
  description_template: |
    Synthetic L2 (concurrent dual-fault) scenario.

    Two independent service outages were applied simultaneously: payment
    was scaled to 0 replicas, and valkey-cart was scaled to 0. Both faults
    last the same active-fault window. Customers see two unrelated checkout
    failure modes at once — common in deploy-correlated incidents.

    Multi-gold retrieval target: this episode contributes two distinct
    gold tickets (one per fault). Recall@5 should capture at least one;
    AllGold@5 measures whether the cascade captures both.
fault:
  fault_id: multifault-concurrent-001
  fault_type: multi_fault_concurrent
  affected_service: payment+valkey-cart
  expected_start_offset_seconds: 300
  expected_duration_seconds: 600
  blast_radius:
    user_visible: true
    expected_error_rate: very_high
    expected_latency_impact: high
