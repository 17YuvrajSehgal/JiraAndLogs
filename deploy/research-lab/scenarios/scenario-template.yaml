schema_version: 1
scenario_id: template
title: Human readable scenario title
description: >
  Describe the production-like situation being simulated, including why this
  should or should not become a Jira issue.
dataset_run_id: local-dev-run-001
traffic_profile_id: baseline-checkout-mix
environment: research-local
jira_candidate: true
expected_jira:
  issue_type: Incident
  priority: Major
  components:
    - Online Boutique
  labels:
    - synthetic-incident
    - telemetry-linked
  summary_template: "[{{severity}}] {{affected_service}} degradation during {{fault_type}}"
  description_template: |
    Synthetic lab issue generated from telemetry scenario {{scenario_id}}.

    Affected service: {{affected_service}}
    Fault type: {{fault_type}}
    Incident window: {{start_time}} to {{end_time}}
    Linked telemetry window ids: {{telemetry_window_ids}}
fault:
  fault_id: template-fault
  fault_type: none
  affected_service: frontend
  expected_start_offset_seconds: 300
  expected_duration_seconds: 600
  blast_radius:
    user_visible: false
    expected_error_rate: low
    expected_latency_impact: low
labels:
  severity: minor
  incident_type: baseline
  root_cause_category: none
  should_alert: false
  should_create_jira_shadow_issue: false
execution:
  action: RecordOnly
  namespace: online-boutique-research
  target_kind: deployment
  target_name: frontend
  target_container: server
  selector: app=frontend
  env: {}
# Optional. Adds per-window triage labels for the forward-looking triage task.
# See docs/triage-task-contract.md for the full label space and source policy.
# Window types: pre_fault_baseline, active_fault, recovery_window for fault
# scenarios; observation_window for baseline scenarios.
triage:
  schema_version: 1
  scenario_family: template-family
  per_window:
    pre_fault_baseline:
      triage_label: noise
      triage_severity: null
      triage_components: null
      triage_reason_class: null
      is_hard_case: false
      rationale: "Pre-fault baseline. No injected fault; not ticket-worthy."
    active_fault:
      triage_label: ticket_worthy   # or borderline / noise depending on scenario
      triage_severity: major         # required when triage_label is ticket_worthy
      triage_components:             # required when triage_label is ticket_worthy
        - frontend
      triage_reason_class: outage    # required when triage_label is ticket_worthy
      is_hard_case: false
      rationale: "Describe why this window is ticket-worthy."
    recovery_window:
      triage_label: borderline       # often borderline; depends on residual impact
      triage_severity: minor
      triage_components:
        - frontend
      triage_reason_class: outage
      is_hard_case: true
      rationale: "Recovery may carry residual errors; reasonable engineers disagree."
