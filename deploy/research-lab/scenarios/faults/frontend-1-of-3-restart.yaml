schema_version: 1
scenario_id: frontend-1-of-3-restart
title: Single frontend pod restart with healthy replication (noise)
description: >
  One frontend pod restarts while the deployment is at 3 replicas.
  Other 2 replicas continue serving; users see no impact. This is the
  prototypical false-positive shape that on-call must learn to ignore.
  Family: single-pod-restart-healthy-replication (D1.3).

  Note: current harness `RestartPods` deletes all pods matching the
  selector. To genuinely simulate 1-of-3, the cluster needs replicas=3
  pre-scenario and a chaos-mesh PodChaos with one=true selector.
  Until then, this scenario uses RestartPods and the noise label
  rests on the fact that pods come back quickly (no business loss).
dataset_run_id: local-dev-run-001
traffic_profile_id: baseline-checkout-mix
environment: research-local
jira_candidate: false
