schema_version: 1
scenario_id: checkoutservice-pod-restart-major
title: Checkout service restart causes transient order failures
dataset_run_id: local-dev-run-001
traffic_profile_id: baseline-checkout-mix
environment: research-local
jira_candidate: true
expected_jira:
  issue_type: Incident
  priority: Major
  components:
    - checkoutservice
    - frontend
    - cartservice
    - paymentservice
  labels:
    - synthetic-incident
    - pod-restart
    - checkoutservice
    - telemetry-linked
  summary_template: "Checkout service restart caused transient order failures"
  description_template: |
    Synthetic lab issue generated from scenario checkoutservice-pod-restart-major.

    Checkoutservice pods were restarted while user checkout traffic was active.
    The episode should show restart evidence, failed checkout attempts, and
    recovery after the replacement pod becomes ready.
fault:
  fault_id: checkoutservice-pod-restart-001
  fault_type: pod_restart
  affected_service: checkoutservice
  suggested_mechanism: delete checkoutservice pods and observe replacement behavior
  expected_start_offset_seconds: 300
  expected_duration_seconds: 300
  blast_radius:
    user_visible: true
    expected_error_rate: medium
    expected_latency_impact: medium
labels:
  severity: major
  incident_type: degradation
  root_cause_category: workload_restart
  should_alert: true
  should_create_jira_shadow_issue: true
execution:
  action: RestartPods
  namespace: online-boutique-research
  target_kind: deployment
  target_name: checkoutservice
  selector: app=checkoutservice
triage:
  schema_version: 1
  scenario_family: checkout-restart
  per_window:
    pre_fault_baseline:
      triage_label: noise
      triage_severity: null
      triage_components: null
      triage_reason_class: null
      is_hard_case: false
      rationale: "Pre-fault baseline; checkoutservice healthy."
    active_fault:
      triage_label: ticket_worthy
      triage_severity: major
      triage_components:
        - checkoutservice
        - frontend
      triage_reason_class: restart_with_impact
      is_hard_case: true
      rationale: "Restart caused customer-visible order failures. Hard case: must be distinguished from healthy-replication single-pod restart."
    recovery_window:
      triage_label: borderline
      triage_severity: minor
      triage_components:
        - checkoutservice
      triage_reason_class: restart_with_impact
      is_hard_case: true
      rationale: "Recovery typically clean but residual failed orders may surface depending on retry behavior."
