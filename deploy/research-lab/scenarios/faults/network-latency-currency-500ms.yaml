schema_version: 1
scenario_id: network-latency-currency-500ms
title: 500ms network latency added to currencyservice (system fault)
description: >
  chaos-mesh NetworkChaos adds 500ms ± 100ms jitter latency on the
  currencyservice pod's network interface for ~120 seconds. Every
  currency-conversion call from frontend / shippingservice /
  checkoutservice slows dramatically; checkout-flow p95 latency
  triples; some upstream timeouts fire.

  D11.6 system fault: tests the canonical "added latency" shape —
  the symptom looks identical to a service-internal latency
  regression, but the root cause is network-layer.

  Requires chaos-mesh installed in the cluster.
