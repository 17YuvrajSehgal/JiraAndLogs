schema_version: 1
scenario_id: packet-loss-frontend-30pct-90s
title: 30% packet loss on frontend for 90 seconds (system fault)
description: >
  chaos-mesh NetworkChaos drops 30% of packets on the frontend pod's
  network interface for ~90 seconds. Some user requests time out and
  are retried; others succeed slowly. Telemetry shows elevated p95
  latency, sporadic 5xx, retry storms — but no service is actually
  down. Borderline: a savvy SRE would page if this persists, but a
  90-second loss spike could plausibly be transient infra.

  D11.5 system fault: tests latency / partial-failure shape on the
  user tier from a transport-layer cause.

  Requires chaos-mesh installed in the cluster.
dataset_run_id: local-dev-run-001
traffic_profile_id: baseline-checkout-mix
