schema_version: 1
scenario_id: deploy-canary-rollback-quick
title: Canary deploy that rolls back quickly (deploy churn)
description: >
  Simulates a canary deploy that triggers an automated rollback within
  a minute. Scaling cartservice from 1 to 2 replicas (canary up) then
  back to 1 mimics the deploy/rollback sequence; transient pod churn
  is visible in restart counts and ramp-up logs but does not produce
  user-visible failure. Family: post-deploy-churn (D1.1).
dataset_run_id: local-dev-run-001
traffic_profile_id: baseline-checkout-mix
environment: research-local
jira_candidate: false
expected_jira:
  issue_type: None
  priority: None
  components:
    - cartservice
  labels:
    - synthetic-deploy-churn
    - canary-rollback
    - negative-window
fault:
  fault_id: deploy-canary-rollback-001
  fault_type: pod_restart_nearmiss
  affected_service: cartservice
  suggested_mechanism: canary scale-up then rollback (replicas 1 -> 2 -> 1)
  expected_start_offset_seconds: 300
  expected_duration_seconds: 45
  blast_radius:
    user_visible: false
    expected_error_rate: very_low
    expected_latency_impact: low
labels:
  severity: minor
  incident_type: near_miss
  root_cause_category: pod_restart
  should_alert: false
  should_create_jira_shadow_issue: false
execution:
  action: ScaleDeployment
  namespace: online-boutique-research
  target_kind: deployment
  target_name: cartservice
  replicas: 2
  restore_replicas: 1
triage:
  schema_version: 1
  scenario_family: post-deploy-churn
  per_window:
    pre_fault_baseline:
      triage_label: noise
      triage_severity: null
      triage_components: null
      triage_reason_class: null
      is_hard_case: false
      rationale: "Pre-canary baseline."
    active_fault:
      triage_label: noise
      triage_severity: null
      triage_components: null
      triage_reason_class: null
      is_hard_case: false
      rationale: "Canary scale-up to 2 replicas; brief ramp-up activity only."
    recovery_window:
      triage_label: noise
      triage_severity: null
      triage_components: null
      triage_reason_class: null
      is_hard_case: true
      rationale: "Rollback scales back to 1 replica; brief pod churn. Hard case: pod-restart shape but not Jira-worthy."
