schema_version: 1
scenario_id: analytics-job-burst
title: Scheduled analytics job burst on shared infra (noise)
description: >
  Simulates a scheduled cron job that consumes shared cluster
  resources for ~60s, causing collateral CPU/memory pressure on
  business services. In a real cluster this would be a CronJob
  resource; in the current harness we approximate by briefly
  restarting the loadgenerator (which transiently changes traffic
  shape and produces logs visually similar to a job burst).
  Family: scheduled-job-spike (D1.5).

  Note: a proper implementation requires a CronJob mechanism plus
  resource-pressure (CPU/memory ballast). Tracked separately for
  the chaos-mesh extension (D11).
