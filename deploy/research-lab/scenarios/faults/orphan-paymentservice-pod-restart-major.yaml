schema_version: 1
scenario_id: orphan-paymentservice-pod-restart-major
title: Paymentservice pod restart — orphan (real fault, no Jira filed)
description: >
  Identical fault to `paymentservice-pod-restart-major` (RestartPods
  on paymentservice during active checkout traffic) but no shadow Jira
  is filed. The active_fault window is gold-labelled `ticket_worthy`.

  D12 near-twin orphan. Tests whether the triage model identifies the
  payment outage from telemetry alone, without a corpus match.
dataset_run_id: local-dev-run-001
traffic_profile_id: baseline-checkout-mix
environment: research-local
jira_candidate: true
produces_jira_ticket: false
expected_jira:
  issue_type: None
  priority: None
  components:
    - paymentservice
    - checkoutservice
  labels:
    - synthetic-orphan
    - pod-restart
    - no-jira-by-design
fault:
  fault_id: orphan-payment-restart-001
  fault_type: pod_restart
  affected_service: paymentservice
  suggested_mechanism: restart paymentservice pods — same as the reported twin
  expected_start_offset_seconds: 300
  expected_duration_seconds: 180
  blast_radius:
    user_visible: true
    expected_error_rate: high
    expected_latency_impact: medium
labels:
  severity: major
  incident_type: service_restart
  root_cause_category: pod_restart
  should_alert: true
  should_create_jira_shadow_issue: true
execution:
  action: RestartPods
  namespace: online-boutique-research
  target_kind: deployment
  target_name: paymentservice
  selector: app=paymentservice
triage:
  schema_version: 1
  scenario_family: payment-outage
  per_window:
    pre_fault_baseline:
      triage_label: noise
      triage_severity: null
      triage_components: null
      triage_reason_class: null
      is_hard_case: false
      rationale: "Pre-fault baseline; paymentservice healthy."
    active_fault:
      triage_label: ticket_worthy
      triage_severity: major
      triage_components:
        - paymentservice
        - checkoutservice
      triage_reason_class: restart_with_impact
      is_hard_case: true
      rationale: "Identical to paymentservice-pod-restart-major but no Jira filed."
    recovery_window:
      triage_label: borderline
      triage_severity: minor
      triage_components:
        - paymentservice
      triage_reason_class: restart_with_impact
      is_hard_case: true
      rationale: "Recovery may carry residual errors."
