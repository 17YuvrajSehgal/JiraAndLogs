schema_version: 1
scenario_id: dns-block-cartservice-60s
title: Cartservice DNS resolution blocked for 60 seconds (system fault)
description: >
  chaos-mesh NetworkChaos blocks every packet from cartservice pods
  destined for the kube-dns pods (kube-system namespace) for 60
  seconds. Cartservice can't resolve hostnames — every fresh
  connection attempt to redis-cart fails at DNS lookup. Existing
  pooled connections may keep working briefly, then exhaust.

  Telemetry signature: cartservice spans show "lookup redis-cart:
  no such host" errors, even though redis-cart itself is healthy
  and the network path to it (when bypassing DNS) is fine. This is
  one of the trickiest production scenarios to diagnose.

  D11.3 system fault: tests whether the model spots a DNS-as-root-cause
  signature distinct from the dependency-outage signature.

  Requires chaos-mesh installed in the cluster.
dataset_run_id: local-dev-run-001
traffic_profile_id: baseline-checkout-mix
environment: research-local
jira_candidate: true
expected_jira:
  issue_type: Incident
  priority: Critical
  components:
    - cartservice
  labels:
    - synthetic-system-fault
    - dns
    - chaos-mesh
    - telemetry-linked
  summary_template: "Cartservice DNS resolution blocked"
  description_template: |
    Synthetic system-fault event from {{scenario_id}}.
    chaos-mesh NetworkChaos blocked cartservice from reaching kube-dns
    for 60s. Customer-visible cart failures.
fault:
  fault_id: dns-block-cartservice-001
  fault_type: dns_outage
  affected_service: cartservice
  suggested_mechanism: chaos-mesh NetworkChaos partition cartservice -> kube-dns
  expected_start_offset_seconds: 300
  expected_duration_seconds: 60
  blast_radius:
    user_visible: true
    expected_error_rate: high
    expected_latency_impact: low
labels:
  severity: critical
  incident_type: outage
  root_cause_category: dns_outage
  should_alert: true
  should_create_jira_shadow_issue: true
execution:
