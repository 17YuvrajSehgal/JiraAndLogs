schema_version: 1
scenario_id: memory-pressure-cartservice-120s
title: Cartservice memory pressure 100MB for 120 seconds (system fault)
description: >
  chaos-mesh StressChaos starts a memory-stressor sidecar process
  inside the cartservice pod that consumes 100 MB of RAM for ~120
  seconds. Cartservice's container memory limit (128 MiB) is mostly
  saturated; the .NET runtime hits GC pressure, request latency
  climbs, and if the limit is exceeded the kubelet OOM-kills the
  container.

  D11.9 system fault: tests the "node-level resource pressure" shape
  — the model needs to recognise the dotnet.gc.* metric explosion
  (M4.5 runtime gauges) + the pod restart count + the inotify watchers
  saturating as a coordinated signal that's distinct from a pure
  pod_restart fault.

  Requires chaos-mesh installed in the cluster.
dataset_run_id: local-dev-run-001
