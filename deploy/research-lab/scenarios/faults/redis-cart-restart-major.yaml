  summary_template: "Redis cart restart caused cart and checkout degradation"
  description_template: |
    Synthetic lab issue generated from scenario redis-cart-restart-major.

    Redis cart pods were restarted while cart and checkout traffic was active.
    This should create transient dependency errors and recovery behavior.
fault:
  fault_id: redis-cart-pod-restart-001
  fault_type: dependency_restart
  affected_service: redis-cart
  suggested_mechanism: delete redis-cart pods and observe cartservice behavior
  expected_start_offset_seconds: 300
  expected_duration_seconds: 300
  blast_radius:
    user_visible: true
    expected_error_rate: medium
    expected_latency_impact: medium
labels:
