  incident_type: degradation
  root_cause_category: dependency_restart
  should_alert: true
  should_create_jira_shadow_issue: true
execution:
  action: RestartPods
  namespace: online-boutique-research
  target_kind: deployment
  target_name: redis-cart
  selector: app=redis-cart
triage:
  schema_version: 1
  scenario_family: cart-redis
  per_window:
    pre_fault_baseline:
      triage_label: noise
      triage_severity: null
      triage_components: null
      triage_reason_class: null
      is_hard_case: false
      rationale: "Pre-fault baseline; redis-cart healthy."
    active_fault:
      triage_label: ticket_worthy
      triage_severity: major
      triage_components:
        - redis-cart
        - cartservice
        - checkoutservice
      triage_reason_class: restart_with_impact
      is_hard_case: true
      rationale: "Restart caused transient dependency errors. Hard case: must distinguish from a healthy single-pod restart."
    recovery_window:
      triage_label: borderline
      triage_severity: minor
      triage_components:
        - redis-cart
      triage_reason_class: restart_with_impact
      is_hard_case: true
      rationale: "Recovery typically clean but cart retries may still leak failures."
