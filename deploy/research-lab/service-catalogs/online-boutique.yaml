# Online Boutique service catalog.
#
# DOCUMENTATION OF EXISTING OB STATE — not a refactor.
#
# This catalog mirrors the canonical services block currently HARDCODED in
# src/v2_advanced/proposal_d_knowledge_graph/extractor.py
# (`_CANONICAL_SERVICES_BLOCK`).  The extractor still uses the hardcoded
# block by default; this YAML is informational + a reference for future
# refactors.
#
# Do not edit this file expecting LLM prompt changes — those go through
# the hardcoded constant.

app_id: online-boutique
display_name: Online Boutique
namespace: online-boutique-research

canonical_services:
  - name: cartservice
    aliases: [cart, cart-service]
    language: dotnet
    role: cart
    criticality: high
  - name: checkoutservice
    aliases: [checkout, checkout-service, cart checkout]
    language: go
    role: order-placement
    criticality: critical
  - name: currencyservice
    aliases: [currency, currency-service, fx service]
    language: node
    role: fx-conversion
    criticality: high
  - name: paymentservice
    aliases: [payment, payments, payment-service]
    language: node
    role: payment-processing
    criticality: critical
  - name: productcatalogservice
    aliases:
      - product service
      - product-service
      - product catalog
      - category service
      - category-page-service
      - catalog service
    language: go
    role: catalog
    criticality: critical
  - name: recommendationservice
    aliases: [recs, recommendations, recommendation]
    language: python
    role: recommendations
    criticality: medium
  - name: shippingservice
    aliases: [shipping, ship-service]
    language: go
    role: shipping
    criticality: high
  - name: emailservice
    aliases: [email, email-service]
    language: python
    role: notifications
    criticality: medium
  - name: adservice
    aliases: [ads, ad, ad-service]
    language: java
    role: ads
    criticality: low
  - name: frontend
    aliases: [ui, web, browser, frontend-service]
    language: go
    role: web-ui
    criticality: critical
  - name: redis-cart
    aliases: []
    language: native
    role: cart-cache
    criticality: high
  - name: loadgenerator
    aliases: [load generator, loadgen, k6]
    language: python
    role: synthetic-traffic
    criticality: low

canonical_components:
  - envoy
  - kubelet
  - redis
  - mysql
  - kafka
  - postgres
  - istio
  - prometheus
  - grafana
  - loki
  - tempo
  - ingress
  - configmap
  - secret
  - pvc
  - pod
  - deployment
  - hpa
  - vpa
  - statefulset

canonical_error_classes:
  grpc:
    - DeadlineExceeded
    - Unavailable
    - Internal
    - ResourceExhausted
    - NotFound
    - Unauthenticated
    - PermissionDenied
    - Aborted
    - FailedPrecondition
    - AlreadyExists
    - OutOfRange
    - Cancelled
    - DataLoss
    - Unknown
    - Unimplemented
    - InvalidArgument
  k8s:
    - OOMKilled
    - CrashLoopBackOff
    - ImagePullBackOff
    - ContainerCannotRun
    - PodPending
    - NodeNotReady
  http:
    - "500"
    - "502"
    - "503"
    - "504"
    - "429"

infra_components:
  - name: redis-cart
    role: cache
  - name: loki
    role: log-aggregation
  - name: tempo
    role: trace-storage
  - name: prometheus
    role: metrics
